<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparative Thermal Conduction: H2 vs N2</title>
    <style>
        body { margin: 0; background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #controls { background: #161b22; padding: 15px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: center; gap: 40px; flex-wrap: wrap; z-index: 10; }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 11px; margin-bottom: 5px; font-weight: bold; color: #8b949e; }
        input[type=range] { width: 130px; cursor: pointer; }
        .value-display { font-family: monospace; color: #58a6ff; font-size: 14px; margin-top: 3px; }
        
        #sim-container { flex-grow: 1; position: relative; }
        canvas { background: #0d1117; display: block; cursor: crosshair; }
        
        #active-molecule-label { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); color: #f0f6fc; font-size: 20px; font-weight: bold; font-family: monospace; padding: 5px 15px; background: rgba(0,0,0,0.5); border-radius: 8px; border: 1px solid #30363d; pointer-events: none; }

        .wall-label { position: absolute; top: 10px; font-size: 14px; font-weight: bold; color: white; padding: 3px 10px; border-radius: 4px; z-index: 5; pointer-events: none; }
        #hot-label { left: 10px; background: #da3633; border: 1px solid #f85149; }
        #cold-label { right: 10px; background: #1f6feb; border: 1px solid #388bfd; }

        .btn-reset { background: #238636; color: white; border: 1px solid rgba(240,246,252,0.1); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-reset:hover { background: #2ea043; }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label>MOLECULE TYPE</label>
            <select id="moleculeSelect" style="background: #1f242b; color: #c9d1d9; border: 1px solid #30363d; padding: 5px; border-radius: 4px; font-family: monospace;">
                <option value="H2" selected>Hydrogen (H₂) - Light (2u)</option>
                <option value="N2">Nitrogen (N₂) - Heavy (28u)</option>
            </select>
        </div>

        <div class="control-group">
            <label>COLD WALL TEMP</label>
            <input type="range" id="coldSlider" min="1" max="50" step="1" value="10">
            <div class="value-display" id="c-val">10 K</div>
        </div>

        <button class="btn-reset" id="resetBtn">Inject Gas Sample</button>
    </div>

    <div id="sim-container">
        <canvas id="simCanvas"></canvas>
        
        <div id="active-molecule-label">ACTIVE: <span id="label-mol">H₂</span></div>
        
        <div class="wall-label" id="hot-label">HOT SOURCE (Click)</div>
        <div class="wall-label" id="cold-label">COLD SINK</div>
    </div>

    <script src="simulation.js"></script>
</body>
</html>
