<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixed Gas Thermal Conduction</title>
    <style>
        body { margin: 0; background: #0d1117; color: #c9d1d9; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #controls { background: #161b22; padding: 15px; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: center; gap: 25px; flex-wrap: wrap; z-index: 10; }
        .control-group { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 11px; margin-bottom: 5px; font-weight: bold; color: #8b949e; text-transform: uppercase; }
        
        #legend { display: flex; gap: 15px; background: #0d1117; padding: 8px 15px; border-radius: 8px; border: 1px solid #30363d; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; }
        .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid white; }

        #sim-container { flex-grow: 1; position: relative; }
        canvas { background: #0d1117; display: block; cursor: crosshair; width: 100%; height: 100%; }
        
        .wall-label { position: absolute; top: 10px; font-size: 11px; font-weight: bold; color: white; padding: 4px 10px; border-radius: 4px; opacity: 0.8; pointer-events: none; }
        #hot-label { left: 10px; background: #da3633; }
        #cold-label { right: 10px; background: #1f6feb; }

        button { color: white; border: 1px solid rgba(240,246,252,0.1); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #heatBtn { background: #da3633; }
        #resetBtn { background: #238636; }
        button:active { transform: translateY(1px); }
    </style>
</head>
<body>

    <div id="controls">
        <div class="control-group">
            <label>1. Select Chemicals</label>
            <div id="legend">
                <label class="legend-item"><input type="checkbox" id="checkH2" checked> <div class="dot" style="background: #58a6ff;"></div> H₂ (Light)</label>
                <label class="legend-item"><input type="checkbox" id="checkN2"> <div class="dot" style="background: #8b949e;"></div> N₂ (Heavy)</label>
            </div>
        </div>

        <div class="control-group">
            <label>2. Actions</label>
            <div style="display: flex; gap: 10px;">
                <button id="heatBtn">Inject Heat (Left)</button>
                <button id="resetBtn">Inject Gas Sample</button>
            </div>
        </div>
    </div>

    <div id="sim-container">
        <canvas id="simCanvas"></canvas>
        <div class="wall-label" id="hot-label">HOT SOURCE</div>
        <div class="wall-label" id="cold-label">COLD SINK</div>
    </div>

    <script src="simulation.js"></script>
</body>
</html>
